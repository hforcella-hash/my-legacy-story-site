<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Subtle warm radial glow behind the mark -->
    <radialGradient id="bg-glow" cx="50%" cy="48%" r="38%">
      <stop offset="0%"   stop-color="#2A211A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1C1814" stop-opacity="1"/>
    </radialGradient>
    <!-- Gold ambient halo behind icon -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#B8924A" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#B8924A" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft glow on the icon mark -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background with subtle warm center -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg-glow)"/>
  <!-- Gold halo -->
  <ellipse cx="512" cy="500" rx="300" ry="340" fill="url(#halo)"/>

  <!-- Icon mark at scale 14, centered, with glow filter -->
  <g transform="translate(512,512) scale(14) translate(-24,-24)" filter="url(#glow)">
    <path d="M24 38 C24 38 10 34 8 14 L8 10 C8 10 16 12 24 18"
          fill="none" stroke="#F5F0E8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M24 38 C24 38 38 34 40 14 L40 10 C40 10 32 12 24 18"
          fill="none" stroke="#F5F0E8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M24 18 L24 38"
          fill="none" stroke="#B8924A" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M24 28 C24 28 28 24 32 22"
          fill="none" stroke="#B8924A" stroke-width="0.9" stroke-linecap="round"/>
    <path d="M24 24 C24 24 20 20 18 17"
          fill="none" stroke="#B8924A" stroke-width="0.9" stroke-linecap="round"/>
    <circle cx="32" cy="22" r="2"   fill="#B8924A"/>
    <circle cx="18" cy="17" r="1.5" fill="#B8924A"/>
    <circle cx="28" cy="19" r="1.2" fill="#B8924A" opacity="0.7"/>
  </g>
</svg>
